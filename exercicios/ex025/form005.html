<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="sxmas" value="M"> 
            <label for="sxmas">Masculino</label> <br>

            <input type="radio" name="sexo" id="sxfem" value="F" checked> 
            <label for="sxfem">Feminino</label>

        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>

            <input type="checkbox" name="espfut" id="espfut" checked> 
            <label for="espfut">Futebol</label> <br>
            
            <input type="checkbox" name="espbas" id="espbas"> 
            <label for="espbas">Basquete</label> <br>

            <input type="checkbox" name="espnat" id="espnat"> 
            <label for="espnat">Natação</label> <br>

            <input type="checkbox" name="espten" id="espten"> 
            <label for="espten">Tênis</label>

        </fieldset>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
