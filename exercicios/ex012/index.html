<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu proprio servidor</p>

    <video width="500" poster="imagens/mar.jpg" controls loop>
        <source src="midia/Meu-Video30f.m4v.m4v" type="video/mp4">
        <source src="midia/Meu-Video30f.webm.webm" type="video/webm">
        <source src="midia/Meu-Video30f.ogv.ogv" type="video/ogv">
        <p>Seu navegador nao tem compatibilidade com reproducao de videos.</p>

    </video>

    <h1>Inserindo videos do youtube</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/3JWKoVCkT1w?si=15ivajR0BWQquVX8&amp;start=4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
